<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4B400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Moon body -->
  <circle cx="50" cy="50" r="45" fill="url(#moonGradient)" filter="url(#glow)"/>
  
  <!-- Craters -->
  <circle cx="30" cy="35" r="8" fill="#D4A017" opacity="0.6"/>
  <circle cx="65" cy="45" r="10" fill="#D4A017" opacity="0.5"/>
  <circle cx="45" cy="65" r="7" fill="#D4A017" opacity="0.6"/>
  <circle cx="70" cy="70" r="6" fill="#D4A017" opacity="0.5"/>
  <circle cx="25" cy="55" r="5" fill="#D4A017" opacity="0.7"/>
  
  <!-- Shine -->
  <ellipse cx="35" cy="30" rx="12" ry="8" fill="#FFF" opacity="0.3"/>
</svg>
